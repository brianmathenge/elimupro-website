<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elimupro International | Content Manager</title>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <style>
    :root {
      --primary: #9b4500;
      --secondary: #006d36;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
</head>
<body>
  <script>
    CMS.init();
    
    // Blog post preview
    CMS.registerPreviewTemplate('blog', function({ entry, widgetFor }) {
      return `
        <div style="max-width:800px;margin:20px auto;padding:30px;font-family:Inter,sans-serif;background:white;border-radius:16px;">
          <span style="background:#9b450020;color:#9b4500;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;">
            ${entry.getIn(['data', 'category']) || 'Category'}
          </span>
          <h1 style="font-family:Montserrat,sans-serif;font-size:2.5rem;color:#191c1e;margin:16px 0;">
            ${entry.getIn(['data', 'title']) || 'Post Title'}
          </h1>
          <p style="color:#564339;font-size:14px;margin-bottom:24px;">
            By ${entry.getIn(['data', 'author']) || 'Elimupro Team'} • ${entry.getIn(['data', 'date']) || 'Date'}
          </p>
          ${entry.getIn(['data', 'image']) ? 
            `<img src="${entry.getIn(['data', 'image'])}" style="width:100%;max-height:400px;object-fit:cover;border-radius:12px;margin-bottom:24px;" />` 
            : ''
          }
          <div style="line-height:1.8;color:#333;font-size:16px;">
            ${widgetFor('body') || '<p>Write your content here...</p>'}
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
