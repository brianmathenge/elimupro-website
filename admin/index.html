<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELIMUPRO International | Admin Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f7f9fb; }
    .login-container { max-width: 400px; margin: 100px auto; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="bg-white p-8 rounded-2xl shadow-xl">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Admin Portal</h1>
        <p class="text-gray-500 text-sm mt-2">ELIMUPRO International</p>
      </div>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" placeholder="Enter your Email" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" placeholder="Enter password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-500" required>
        </div>
        <button type="submit" class="w-full bg-orange-600 text-white py-2 rounded-lg font-semibold hover:bg-orange-700 transition">
          Login
        </button>
      </form>
      
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Simple authentication (change these credentials)
      if (email === 'admin@elimupro.com' && password === 'Elimu@2024!') {
        alert('Login successful! Redirecting to dashboard...');
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid credentials. Please try again.');
      }
    });
  </script>
</body>
</html>
