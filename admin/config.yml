backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

# UPDATE THESE URLs:
site_url: "https://elimupro.com"
display_url: "https://elimupro.com"
logo_url: "https://elimupro.com/logo.png"

locale: 'en'

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string", default: "Elimupro Team" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { 
          label: "Publish Date", 
          name: "date", 
          widget: "datetime",
          format: "YYYY-MM-DD",
          date_format: "YYYY-MM-DD",
          time_format: false,
          default: ""
        }
      - { 
          label: "Featured Image", 
          name: "image", 
          widget: "image", 
          required: false 
        }
      - { 
          label: "Category", 
          name: "category", 
          widget: "select",
          options: ["AI & Technology", "Capacity Building", "Partnerships", "Digital Literacy", "EdTech Innovation", "Policy & Governance"]
        }
      - { 
          label: "Status", 
          name: "status", 
          widget: "select",
          options: ["draft", "published"],
          default: "draft"
        }
      - { label: "Content", name: "body", widget: "markdown" }