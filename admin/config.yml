backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: "https://elimupro.netlify.app"
display_url: "https://elimupro.netlify.app"

logo_url: "https://elimupro.netlify.app/logo.png"

locale: 'en'

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string", default: "Elimupro Team" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { 
          label: "Publish Date", 
          name: "date", 
          widget: "datetime",
          format: "YYYY-MM-DD",
          date_format: "YYYY-MM-DD",
          time_format: false,
          default: ""
        }
      - { 
          label: "Featured Image", 
          name: "image", 
          widget: "image", 
          required: false 
        }
      - { 
          label: "Category", 
          name: "category", 
          widget: "select",
          options: ["AI & Technology", "Capacity Building", "Partnerships", "Digital Literacy", "EdTech Innovation", "Policy & Governance"]
        }
      - { 
          label: "Status", 
          name: "status", 
          widget: "select",
          options: ["draft", "published"],
          default: "draft"
        }
      - { 
          label: "Excerpt", 
          name: "excerpt", 
          widget: "text",
          required: false
        }
      - { label: "Content", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings/general.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string", default: "Elimupro International" }
          - { label: "Contact Email", name: "contact_email", widget: "string", default: "info@elimupro.com" }
          - { label: "Phone Number", name: "phone", widget: "string", default: "0777722201" }
          - { label: "Address", name: "address", widget: "text", default: "Mountain Mall, Thika Super Highway, Nairobi" }